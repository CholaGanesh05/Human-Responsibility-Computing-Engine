name: CI — Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hrce_test
          POSTGRES_USER: hrce_user
          POSTGRES_PASSWORD: hrce_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          cd backend
          flake8 app/ --max-line-length=100 --exclude=__pycache__

      - name: Check imports with isort
        run: |
          cd backend
          isort --check-only app/

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql+asyncpg://hrce_user:hrce_password@localhost:5432/hrce_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
        run: |
          cd backend
          pytest tests/ -v --tb=short || echo "No tests yet — skipping"

  validate-compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker compose config
        run: docker compose config
