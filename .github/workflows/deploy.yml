name: Deploy — Railway
# ──────────────────────────────────────────────────────────────────────────────
# Automatically deploys the backend and agent-service to Railway on push to main.
# To use this, add RAILWAY_TOKEN to your GitHub repository secrets.
# You can generate a token in your Railway project settings.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "hrce-backend"
          
      - name: Deploy Agent Service
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "hrce-agent-service"
