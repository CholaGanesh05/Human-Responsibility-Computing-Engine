name: Deploy — Build & Push

# ──────────────────────────────────────────────────────────────────────────────
# This workflow builds and pushes Docker images to Docker Hub.
# To enable it, add these secrets to your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#   - DOCKER_USERNAME  (your Docker Hub username)
#   - DOCKER_PASSWORD  (your Docker Hub access token)
# Then change the 'on' trigger below back to push/main.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:  # Only runs when manually triggered, not on every push

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hrce-backend:latest

      - name: Build & push agent-service image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hrce-agent-service:latest

